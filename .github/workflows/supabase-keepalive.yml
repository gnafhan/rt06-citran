name: Supabase Keepalive

# Free-tier Supabase projects auto-pause after ~1 week of zero API activity.
# This workflow pings the REST API on a schedule so the project stays "active"
# and never gets paused (which would break the live site).

on:
  schedule:
    # Every 3 days at 03:00 UTC (10:00 WIB) — well under Supabase's ~7-day pause window
    - cron: "0 3 */3 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API (site_content table)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::SUPABASE_URL or SUPABASE_ANON_KEY secret is not set."
            exit 1
          fi

          echo "Pinging ${SUPABASE_URL}/rest/v1/site_content ..."

          http_code=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/site_content?select=key&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")

          echo "HTTP status: ${http_code}"
          cat /tmp/resp.json
          echo

          if [ "${http_code}" -ge 200 ] && [ "${http_code}" -lt 300 ]; then
            echo "✅ Supabase project is alive."
          else
            echo "::warning::Unexpected status ${http_code} — project may be paused or unreachable."
            exit 1
          fi
