<!--
  Subject: Konfirmasi perubahan email admin
-->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konfirmasi perubahan email</title>
</head>
<body style="margin:0;padding:0;background-color:#F4EBD9;font-family:'Helvetica Neue',Arial,sans-serif;color:#1F1A15;">
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color:#F4EBD9;">
    <tr>
      <td align="center" style="padding:40px 20px;">
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="560" style="max-width:560px;background-color:#FBF5E8;border:1px solid rgba(31,26,21,0.08);border-radius:12px;">
          <tr>
            <td style="padding:40px 40px 20px;">
              <p style="margin:0;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#8A7F76;font-family:'Courier New',monospace;">
                Perubahan Email
              </p>
              <h1 style="margin:16px 0 0;font-family:Georgia,'Times New Roman',serif;font-size:32px;line-height:1.15;color:#1F1A15;font-weight:400;letter-spacing:-0.02em;">
                Konfirmasi <em style="color:#6B4423;">email baru</em>.
              </h1>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 40px;">
              <p style="margin:0 0 16px;font-size:15px;line-height:1.65;color:#4A403A;">
                Anda meminta perubahan email untuk akun admin RT 06 Citran. Klik tombol di bawah untuk mengonfirmasi.
              </p>
            </td>
          </tr>
          <tr>
            <td align="left" style="padding:8px 40px 32px;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;background-color:#1F1A15;color:#F4EBD9;text-decoration:none;padding:14px 28px;border-radius:6px;font-size:14px;font-weight:500;">
                Konfirmasi email baru
              </a>
            </td>
          </tr>
          <tr>
            <td style="padding:0 40px 40px;border-top:1px solid rgba(31,26,21,0.08);padding-top:24px;">
              <p style="margin:0;font-size:12px;line-height:1.6;color:#8A7F76;">
                Kalau Anda tidak meminta perubahan ini, segera hubungi Ketua RT dan atur ulang kata sandi Anda.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
